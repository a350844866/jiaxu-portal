services:
  jiaxu-portal:
    build: .
    container_name: jiaxu-portal
    restart: unless-stopped
    ports:
      - "3200:3000"
    environment:
      - NODE_ENV=production
      - NPM_URL=${NPM_URL}
      - NPM_EMAIL=${NPM_EMAIL}
      - NPM_PASSWORD=${NPM_PASSWORD}
      - NPM_ACCESS_LIST_ID=1
      - SURGE_RULES_DIR=/data/surge-rules
      - AUTH_DIR=/data/auth
      - NACOS_BACKEND_URL=${NACOS_BACKEND_URL}
      - VLOGS_BASE_URL=${VLOGS_BASE_URL}
      - NACOS_PROXY_SECRET=${NACOS_PROXY_SECRET}
      - PROXIED_HOSTS=${PROXIED_HOSTS}
      - PORTAL_ORIGIN=${PORTAL_ORIGIN}
      - USAGE_DB_HOST=${USAGE_DB_HOST}
      - USAGE_DB_PORT=${USAGE_DB_PORT}
      - USAGE_DB_USER=${USAGE_DB_USER}
      - USAGE_DB_PASS=${USAGE_DB_PASS}
      - USAGE_DB_NAME=${USAGE_DB_NAME}
      - CODEX_DB_PATH=/data/codex-home/state_5.sqlite
      - CODEX_SESSIONS_PATH=/data/codex-home/sessions
      # 远端 Codex 源(公司 MBP rsync 上来的 ~/.codex 副本)；同一 OpenAI 账号并入配额组
      - CODEX_REMOTE_DIRS=[{"dir":"/data/codex-mbp"}]
      - QUANT_FLOW_LLM_CALLS_PATH=/data/quant-flow-llm-calls
      - PORTAL_STATE_DIR=/data/portal-state
      - VAULT_DIR=/data/vault
      - SERENITY_CORPUS_DIR=/data/x-corpus
      - WIFE_OBSERVER_API_TOKEN=${WIFE_OBSERVER_API_TOKEN}
      - WIFE_OBSERVER_BACKEND_URL=${WIFE_OBSERVER_BACKEND_URL}
      - N8N_API_URL=${N8N_API_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_PUBLIC_URL=${N8N_PUBLIC_URL}
      # mac-mini-collector (PORTAL_ 前缀避免被 /etc/environment 全局 TELEGRAM_BOT_TOKEN 静默覆盖)
      - PORTAL_TG_BOT_TOKEN=${PORTAL_TG_BOT_TOKEN}
      - PORTAL_TG_CHAT_ID=${PORTAL_TG_CHAT_ID}
      - MAC_MINI_HOST=${MAC_MINI_HOST:-192.168.31.2}
      - ROUTER_HOST=${ROUTER_HOST:-192.168.31.1}
      - MAC_MINI_SSH_USER=${MAC_MINI_SSH_USER:-jiaxu}
      - MAC_MINI_SSH_KEY=/data/portal-state/.ssh/id_ed25519_macmini
      - MAC_MINI_SSH_KNOWN_HOSTS=/data/portal-state/.ssh/known_hosts_macmini
    volumes:
      - ./data/surge-rules:/data/surge-rules
      - ./data/auth:/data/auth
      - /home/jiaxu/.codex:/data/codex-home:ro
      - /data/claude-usage/remote-codex/mbp:/data/codex-mbp:ro
      - /programHost/vibe-coding/quant-flow/logs/llm_calls:/data/quant-flow-llm-calls:ro
      - /data/portal-state:/data/portal-state:ro
      # vault mount for TodoCard — reads TODO.md (potentially other top-level files later)
      - /programHost/obsidian/jiaxu:/data/vault:ro
      # serenity dashboard — reads tweets-full.json + ledger.json (ro)
      - /data/x-exports/aleabitoreddit:/data/x-corpus:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # qB 健康检查走 LAN .67 直连(2.5G):域名保证证书 CN 匹配 + 过 qB HostHeaderValidation
      - "home.liulin.work:192.168.31.67"
    networks:
      - share-network

networks:
  share-network:
    external: true
